steps:
  # ── 1. Build Docker image ────────────────────────────────────────────────────
  # NEXT_PUBLIC_* vars must be passed at build time so Next.js can inline
  # them into the browser JavaScript bundle.
  # Set substitution variable values in the Cloud Build trigger settings in
  # GCP Console, or pass --substitutions on the CLI (see DEPLOY.md).
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/foodie-buddy"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}"
      - "."

  # ── 2. Push image to Artifact Registry ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/foodie-buddy"

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - foodie-buddy
      - "--image=gcr.io/$PROJECT_ID/foodie-buddy"
      - "--region=us-east1"
      - "--allow-unauthenticated"
      - "--port=3080"
      - "--memory=512Mi"
      - "--timeout=300"

images:
  - "gcr.io/$PROJECT_ID/foodie-buddy"

# ── Substitution variable defaults ──────────────────────────────────────────
# Override these in GCP Console → Cloud Build → Triggers → Edit → Substitutions
# or pass --substitutions on the CLI:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions \
#       _NEXT_PUBLIC_SUPABASE_URL="https://xxx.supabase.co",\
#       _NEXT_PUBLIC_SUPABASE_ANON_KEY="eyJxxx",\
#       _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="AIzaxxx",\
#       _NEXT_PUBLIC_APP_URL="https://foodie-buddy-xxx.run.app"
substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
  _NEXT_PUBLIC_APP_URL: ""
